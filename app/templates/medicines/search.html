{% extends "base.html" %}
{% block title %}Medicines - MAMA AI Clinic{% endblock %}

{% block content %}
<h1 style="font-size: 22px; margin-bottom: 4px;">Essential Medicines</h1>
<p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 16px;">
    WHO Essential Medicines List -- search and dosing calculator
</p>

<div class="form-group">
    <input type="text" id="searchInput" placeholder="Search medicine name..." autocomplete="off">
</div>

<div id="searchResults"></div>

<div id="dosingForm" style="display: none;">
    <div class="card">
        <h3 id="selectedMedicine"></h3>
        <div class="form-group">
            <label for="formulation">Formulation</label>
            <select id="formulation"></select>
        </div>
        <div class="form-group">
            <label for="weightKg">Patient weight (kg)</label>
            <input type="number" id="weightKg" min="1" max="200" step="0.5" placeholder="Preferred">
        </div>
        <div class="form-group">
            <label for="ageYears">Patient age (years)</label>
            <input type="number" id="ageYears" min="0" max="120" step="0.1" placeholder="If weight unknown">
        </div>
        <button class="btn btn-primary" id="calcDose">Calculate Dose</button>
    </div>
</div>

<div id="doseResult" style="display: none;"></div>
{% endblock %}

{% block scripts %}
<script>
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const dosingForm = document.getElementById('dosingForm');
const doseResult = document.getElementById('doseResult');

let selectedMed = null;
let searchTimeout = null;

searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();
    if (q.length < 2) { searchResults.innerHTML = ''; return; }
    searchTimeout = setTimeout(() => {
        fetch(`/medicines/search?q=${encodeURIComponent(q)}`)
            .then(r => r.json())
            .then(data => {
                searchResults.innerHTML = data.results.map(m =>
                    `<div class="card" style="cursor:pointer" onclick="selectMedicine('${m.id}', '${m.name}', ${JSON.stringify(m.formulations).replace(/"/g, '&quot;')})">
                        <strong>${m.name}</strong>
                        <div style="font-size:12px;color:var(--color-text-secondary)">${m.category || ''}</div>
                    </div>`
                ).join('') || '<p style="color:var(--color-text-secondary);font-size:13px">No medicines found</p>';
            });
    }, 300);
});

function selectMedicine(id, name, formulations) {
    selectedMed = id;
    document.getElementById('selectedMedicine').textContent = name;
    const formSelect = document.getElementById('formulation');
    formSelect.innerHTML = formulations.map(f =>
        `<option value="${f}">${f.replace(/_/g, ' ')}</option>`
    ).join('');
    dosingForm.style.display = 'block';
    searchResults.innerHTML = '';
    dosingForm.scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('calcDose').addEventListener('click', async () => {
    const btn = document.getElementById('calcDose');
    btn.disabled = true;
    btn.textContent = 'Calculating...';

    const payload = {
        medicine_id: selectedMed,
        formulation: document.getElementById('formulation').value,
        weight_kg: document.getElementById('weightKg').value || null,
        age_years: document.getElementById('ageYears').value || null,
    };

    try {
        const resp = await fetch('/medicines/dose', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        const data = await resp.json();

        if (data.error) {
            doseResult.innerHTML = `<div class="classification-red"><strong>Error:</strong> ${data.error}</div>`;
        } else {
            doseResult.innerHTML = `
                <div class="card">
                    <h3>${data.medicine}</h3>
                    <div style="font-size:14px;margin:8px 0;">
                        <strong>Dose:</strong> ${data.dose}<br>
                        <strong>Frequency:</strong> ${data.frequency}<br>
                        <strong>Duration:</strong> ${data.duration}
                    </div>
                    ${data.warnings.length ? `<div class="classification-yellow" style="margin-top:8px"><strong>Warnings:</strong><br>${data.warnings.join('<br>')}</div>` : ''}
                    ${data.explanation ? `<div style="margin-top:12px;font-size:13px;color:var(--color-text-secondary)"><strong>Instructions:</strong><br>${data.explanation}</div>` : ''}
                </div>
            `;
        }
        doseResult.style.display = 'block';
    } catch (err) {
        doseResult.innerHTML = '<div class="classification-red">Error reaching server</div>';
        doseResult.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Calculate Dose';
    }
});
</script>
{% endblock %}
